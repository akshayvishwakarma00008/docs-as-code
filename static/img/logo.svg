<svg viewBox="0 0 300 100" xmlns="http://www.w3.org/2000/svg" width="300" height="100">
  <!-- Background gradient definition -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0066cc;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#00ccff;stop-opacity:0.05" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="300" height="100" fill="url(#bgGradient)"/>
  
  <!-- Book/Document stack -->
  <g transform="translate(20, 25)">
    <!-- Bottom page -->
    <rect x="0" y="20" width="40" height="45" fill="#0066cc" rx="3" ry="3"/>
    
    <!-- Middle page -->
    <rect x="10" y="12" width="40" height="45" fill="#0099ff" rx="3" ry="3"/>
    
    <!-- Top page (front) -->
    <rect x="20" y="4" width="40" height="45" fill="#00ccff" rx="3" ry="3"/>
    
    <!-- Text lines on front page -->
    <line x1="28" y1="14" x2="52" y2="14" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="28" y1="23" x2="52" y2="23" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.85"/>
    <line x1="28" y1="32" x2="52" y2="32" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    <line x1="28" y1="41" x2="48" y2="41" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  </g>
  
  <!-- Checkmark (verification/quality) -->
  <g transform="translate(75, 30)">
    <circle cx="20" cy="20" r="20" fill="#28a745" opacity="0.15"/>
    <circle cx="20" cy="20" r="18" fill="none" stroke="#28a745" stroke-width="2.5"/>
    <path d="M 12 20 L 17 26 L 30 13" stroke="#28a745" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Text: "Docs" -->
  <text x="130" y="48" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="700" fill="#0066cc" letter-spacing="-0.5">Docs</text>
  
  <!-- Subtitle: "Knowledge Base" -->
  <text x="130" y="68" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#666" font-weight="500" letter-spacing="1.2" opacity="0.8">KNOWLEDGE BASE</text>
</svg>